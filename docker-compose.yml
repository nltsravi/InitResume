version: '3.8'

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LINKEDIN_COOKIES=${LINKEDIN_COOKIES}
      - DATABASE_URL=postgresql://postgres:admin@db:5432/job_search
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A core.tasks worker --loglevel=info
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LINKEDIN_COOKIES=${LINKEDIN_COOKIES}
      - DATABASE_URL=postgresql://postgres:admin@db:5432/job_search
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: job_search

  redis:
    image: redis:alpine

  # Prometheus Service for metrics aggregation
  prometheus:
    image: prom/prometheus:latest
    container_name: auto_apply_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api

  # Grafana Service for dashboard visualization
  grafana:
    image: grafana/grafana:latest
    container_name: auto_apply_grafana
    ports:
      - "3001:3000" # Map to port 3001 to prevent port conflicts with UI dashboard (3000)
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # Frontend UI Dashboard
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: auto_apply_ui
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  prometheus_data:
  grafana_data:

